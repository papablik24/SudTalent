# Servidor
server.port=8080

# ============ PRODUCCIÓN - PostgreSQL Supabase ============
spring.datasource.url=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.nmlqgmsdmecodosgpuyv
spring.datasource.password=xjbr3szSdrkd
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT
app.jwt.secret=${JWT_SECRET:8MR8b3SBRwtGPv0usAzVUk7Bq8ES8XNSwVqb6fBNF+wTPYSwpJxsfuQ+dViP1rne}
app.jwt.expiration-ms=86400000

# Cookie
app.cookie.name=sv_token
app.cookie.secure=false
# Cambiar a true en produccion (HTTPS)
app.cookie.http-only=true
app.cookie.same-site=Lax
app.cookie.max-age-seconds=86400

# CORS - origen del frontend React
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080

# Logging
logging.level.root=INFO
logging.level.sudtalent.sudtalentproyecto=DEBUG
