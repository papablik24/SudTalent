# ============================================================
# Sudamerican Voices - Application Properties
# ============================================================

# Servidor
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sudamerican_voicesdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#
# JWT
app.jwt.secret=8MR8b3SBRwtGPv0usAzVUk7Bq8ES8XNSwVqb6fBNF+wTPYSwpJxsfuQ+dViP1rne
app.jwt.expiration-ms=86400000

# Cookie
app.cookie.name=sv_token
app.cookie.secure=false
# Cambiar a true en producción (HTTPS)
app.cookie.http-only=true
app.cookie.same-site=Lax
app.cookie.max-age-seconds=86400

# CORS - origen del frontend React
app.cors.allowed-origins=http://localhost:5173
